name: Publish Kandelo bottles

on:
  repository_dispatch:
    types: [publish-kandelo-bottles]

jobs:
  publish:
    permissions:
      actions: read
      contents: write
      packages: write
    uses: Automattic/kandelo/.github/workflows/reusable-homebrew-bottle-publish.yml@3545bfd34509a52b68a4620c92e4aae24c60adb0
    with:
      kandelo-repository: Automattic/kandelo
      # WHY: the `uses` SHA selects the hardened publisher implementation,
      # while this SHA selects the package generation consumed by that code.
      # ABI 42's sealed archives exactly match d380's rootfs identity; later
      # shell-package edits at 3545 intentionally have a different cache key.
      kandelo-ref: d3805721b887a19382ef1c96b576fc27badc0951
      tap-repository: kandelo-dev/homebrew-tap-core
      tap-name: kandelo-dev/tap-core
      # WHY: repository_dispatch loads this caller from main, but Formula
      # source must remain the exact reviewed snapshot the controller approved.
      tap-ref: ${{ github.event.client_payload.tap_sha }}
      formulae: ${{ github.event.client_payload.formulae }}
      arches: ${{ github.event.client_payload.arches || 'wasm32' }}
      release-tag: ${{ github.event.client_payload.release_tag || '' }}
      expected-cache-keys: ${{ github.event.client_payload.expected_cache_keys || '' }}
      force: ${{ github.event.client_payload.force || false }}
      dry-run: false
      require-vfs-acceptance: ${{ github.event.client_payload.require_vfs_acceptance || false }}
      # WHY: ABI 42's package archives were produced immediately before the
      # publisher bridge. The bridge proves this sealed generation is an exact
      # ancestor with the same rootfs closure instead of rebuilding from a
      # mutable release index. Only Python defers its bottle-dependent VFS proof.
      prepublication-staging-tag: pr-1079-staging
      prepublication-staging-kandelo-sha: 437fde2524ea6ad9c44933f8abbf995a46841009
      defer-vfs-acceptance-until-postpublication: ${{ github.event.client_payload.require_vfs_acceptance || false }}
