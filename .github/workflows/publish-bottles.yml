name: Publish Kandelo bottles

on:
  repository_dispatch:
    types: [publish-kandelo-bottles]

jobs:
  publish:
    permissions:
      actions: read
      contents: write
      packages: write
    uses: Automattic/kandelo/.github/workflows/reusable-homebrew-bottle-publish.yml@353b9f818ac46ad0c7eb7b5bbc692aaab3c1af6c
    with:
      kandelo-repository: Automattic/kandelo
      kandelo-ref: main
      tap-repository: kandelo-dev/homebrew-tap-core
      tap-name: kandelo-dev/tap-core
      tap-ref: main
      formulae: ${{ github.event.client_payload.formulae }}
      arches: ${{ github.event.client_payload.arches || 'wasm32' }}
      release-tag: ${{ github.event.client_payload.release_tag || '' }}
      expected-cache-keys: ${{ github.event.client_payload.expected_cache_keys || '' }}
      force: ${{ github.event.client_payload.force || false }}
      dry-run: false
      require-vfs-acceptance: ${{ github.event.client_payload.require_vfs_acceptance || false }}
